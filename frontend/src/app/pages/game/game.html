@if (state.status() === 'waiting') {
  <app-waiting-room
    [players]="state.players()"
    [youId]="state.youId()"
    (kick)="onKick($event)"
  />
} @else if (state.status() === 'finished' && state.finalScores(); as fs) {
  <app-final-screen
    [scores]="fs"
    [players]="state.players()"
    [roundSummaries]="state.roundSummaries() ?? []"
  />
} @else if (state.currentRound(); as r) {
  <app-card-hand
    [phase]="r.phase"
    [roundNumber]="r.number"
    [situation]="r.situation"
    [phaseDeadline]="r.phase_deadline"
    [yourHand]="r.your_hand"
    [yourUsername]="yourUsername()"
    [otherPlayers]="otherPlayers()"
    [players]="state.players()"
    [submissions]="r.submissions"
    [youSubmitted]="r.you_submitted"
    [youVoted]="r.you_voted"
    [winnerSubmissionId]="r.winner_submission_id"
    [voteCounts]="r.vote_counts"
    (pickCard)="onPickCard($event)"
    (voteSubmission)="onVoteSubmission($event)"
  />
  <button type="button" class="logout-overlay" (click)="logout()">Log out</button>
  <button type="button" class="stop-overlay" (click)="stopGame()">Stop</button>
}

@if (errorMsg(); as msg) {
  <div class="error-toast">{{ msg }}</div>
}
